name: Release Stylelint

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install latest npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Update Stylelint
        id: update-stylelint
        run: |
          new_version="$(npm view stylelint version)"
          npm install "https://github.com/stylelint/stylelint/tarball/${new_version}" --save-dev
          echo "new-version=${new_version}" >> "${GITHUB_OUTPUT}"

      - name: Test
        run: npm test

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: Release ${{ steps.update-stylelint.outputs.new-version }}
          title: Release ${{ steps.update-stylelint.outputs.new-version }}
          body: |
            See https://github.com/stylelint/stylelint/releases/tag/${{ steps.update-stylelint.outputs.new-version }}
          branch: release/${{ steps.update-stylelint.outputs.new-version }}
          sign-commits: true
          draft: always-true
